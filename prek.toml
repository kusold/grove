minimum_prek_version = "0.3.0"

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-merge-conflict" },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "goimports", name = "goimports", language = "system", entry = "goimports -w", types = [
    "go",
  ] },
  { id = "go-test", name = "go test", language = "system", entry = "go test ./...", pass_filenames = false },
  { id = "golangci-lint", name = "golangci-lint", language = "system", entry = "golangci-lint run ./...", pass_filenames = false },
  { id = "nix-fmt", name = "nix fmt", language = "system", entry = "nix fmt flake.nix", files = "\\.nix$", pass_filenames = false },
]
